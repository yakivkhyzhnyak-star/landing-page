<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Survey</title>

<link rel="stylesheet" href="style.css">
</head>

<body>

<div class="container">

    <div class="top-box">

        <div class="logos">
            <img src="https://upload.wikimedia.org/wikipedia/commons/a/a6/Logo_Pepsi.svg" alt="">
            <img src="https://upload.wikimedia.org/wikipedia/commons/c/ce/Coca-Cola_logo.svg" alt="">
        </div>

        <h2>Your Opinion Could Be Worth $1000</h2>

    </div>


    <div class="survey-box">

        <h1>100% FREE Entry</h1>

        <div id="timer">

            <span id="m">00</span>
            :
            <span id="s">59</span>

        </div>

        <p>Which soda do you prefer?</p>

        <button onclick="goOffer()">Pepsi</button>

        <button onclick="goOffer()">Coke</button>

    </div>

</div>

<script src="script.js"></script>

</body>
</html>
